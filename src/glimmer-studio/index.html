    <!-- MediaPipe Pose -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.14.0/dist/ort.min.js"></script>
    
    <style>
        :root {
            --royal-gold: linear-gradient(135deg, #d4af37 0%, #f1c40f 50%, #b8860b 100%);
            --deep-obsidian: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --gold-glow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--deep-obsidian);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(212, 175, 55, 0.05) 0%, transparent 40%);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            flex: 1;
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
            padding-bottom: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 8vw, 3.5rem);
            letter-spacing: clamp(5px, 2vw, 12px);
            margin: 0;
            background: var(--royal-gold);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.2));
            line-height: 1.2;
        }

        header p {
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.7rem;
            color: #777;
            margin-top: 5px;
        }

        .main-layout {
            display: flex;
            gap: 20px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        @media (min-width: 1024px) {
            .main-layout {
                flex-direction: row;
                flex-wrap: nowrap;
                justify-content: center;
                gap: 40px;
            }
            .sidebar {
                position: sticky;
                top: 20px;
                width: 360px;
            }
        }

        .viewport-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            aspect-ratio: 4/3;
            border-radius: 30px;
            overflow: hidden;
            background: #000;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 40px 100px rgba(0,0,0,0.9), var(--gold-glow);
            backdrop-filter: blur(10px);
        }

        #webcam {
            position: absolute;
            left: -9999px;
            width: 1px; height: 1px;
        }

        #output-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .sidebar {
            width: 340px;
            max-height: 80vh;
            background: var(--glass);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 25px;
            padding: 25px;
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #d4af37 transparent;
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 10px;
        }

        .section-title {
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            color: #d4af37;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: block;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            padding-bottom: 8px;
            text-transform: uppercase;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toggle-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .tool-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #aaa;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .tool-btn.active {
            background: var(--royal-gold);
            color: #000;
            border-color: transparent;
            font-weight: 700;
        }

        .asset-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .asset-card {
            aspect-ratio: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 15px;
            cursor: pointer;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .asset-card:hover {
            border-color: #d4af37;
            background: rgba(212, 175, 55, 0.05);
        }

        .asset-card.active {
            border-color: #d4af37;
            box-shadow: inset 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .asset-card img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
        }

        .primary-btn {
            background: var(--royal-gold);
            color: #000;
            border: none;
            padding: 15px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            margin-top: auto;
        }

        .status-bar {
            margin-top: 20px;
            font-size: 0.65rem;
            color: #666;
            letter-spacing: 2px;
            text-align: center;
            width: 100%;
        }

        #status-val { color: #aaa; }
        #fps-val { color: #d4af37; }

        #loading-overlay {
            position: absolute;
            inset: 0;
            background: var(--deep-obsidian);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s ease-out;
        }

        .royal-loader {
            width: 50px;
            height: 50px;
            border: 2px solid rgba(212, 175, 55, 0.1);
            border-top: 2px solid #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.6rem;
            color: #444;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>GLIMMER</h1>
            <p>ADVANCED MULTI-FEATURE AR STUDIO</p>
        </header>

        <div class="main-layout">
            <div class="viewport-container">
                <video id="webcam" autoplay playsinline muted></video>
                <canvas id="output-canvas"></canvas>
                
                <div id="loading-overlay">
                    <div class="royal-loader"></div>
                    <p style="margin-top: 20px; letter-spacing: 3px; color: #d4af37; font-family: 'Cinzel'; font-size: 0.7rem;">CALIBRATING NEURAL MIRROR</p>
                </div>
            </div>

            <div class="sidebar">
                <div class="control-group">
                    <span class="section-title">COLLECTION</span>
                    <div class="toggle-btns">
                        <button id="toggle-earrings" class="tool-btn active">Earrings</button>
                        <button id="toggle-necklace" class="tool-btn active">Necklace</button>
                    </div>
                </div>

                <div id="earring-selector" class="control-group">
                    <span class="section-title">EARRINGS</span>
                    <div id="earring-grid" class="asset-grid">
                        <!-- Dynamically loaded -->
                    </div>
                </div>

                <div id="necklace-selector" class="control-group">
                    <span class="section-title">NECKLACES</span>
                    <div id="necklace-grid" class="asset-grid">
                        <!-- Dynamically loaded -->
                    </div>
                </div>

                <button id="start-btn" class="primary-btn">ENTER STUDIO</button>
            </div>
        </div>

        <div class="status-bar">
            SYSTEM <span id="status-val">READY</span> | AI LATENCY <span id="fps-val">0</span>ms
        </div>
    </div>

    <footer>
